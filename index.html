<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3','Source Sans Pro',-apple-system,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh}
.outer{max-width:720px;margin:0 auto;padding:24px 20px}
.logo{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#2c6e49;margin-bottom:4px}
.progress-wrap{margin-bottom:24px}
.progress-track{height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#2c6e49;border-radius:2px;transition:width .4s ease}
.progress-meta{font-size:12px;color:#888;margin-top:6px;display:flex;justify-content:space-between}
.card{background:#fff;border-radius:10px;padding:32px 28px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);margin-bottom:20px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#2c6e49;margin-bottom:8px}
.q-text{font-size:16px;font-weight:500;line-height:1.5;color:#1a1a1a;margin-bottom:20px}
.q-sub{font-size:13px;color:#888;margin-bottom:16px;margin-top:-12px}
.intro-text{font-size:15px;line-height:1.6;color:#444;padding:16px 0}
.opt-group{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;transition:all .15s;font-size:15px;line-height:1.4;user-select:none}
.opt:hover{border-color:#bbb}.opt.selected{border-color:#2c6e49;background:#f0f7f3}

.opt.selected .rc{border-color:#2c6e49;background:#2c6e49}
.rd{width:6px;height:6px;border-radius:50%;background:#fff;display:none}.opt.selected .rd{display:block}
.cb{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;transition:all .15s}
.opt.selected .cb{border-color:#2c6e49;background:#2c6e49}
.cm{display:none}.opt.selected .cm{display:inline}
.other-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:15px}
.other-row.selected{border-color:#2c6e49;background:#f0f7f3}
.other-row.selected .cb{border-color:#2c6e49;background:#2c6e49}
.other-row.selected .cm{display:inline}
.other-input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;background:transparent}
.text-input{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.text-input:focus{border-color:#2c6e49}
.textarea{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid #ddd;border-radius:8px;outline:none;font-family:inherit;min-height:100px;resize:vertical}
.textarea:focus{border-color:#2c6e49}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px}
.btn-pri{padding:12px 32px;font-size:15px;font-weight:600;color:#fff;background:#2c6e49;border:none;border-radius:8px;cursor:pointer}
.btn-pri:hover{background:#245a3a}.btn-pri:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{padding:12px 24px;font-size:15px;font-weight:500;color:#555;background:transparent;border:1.5px solid #ddd;border-radius:8px;cursor:pointer}
.btn-sec:disabled{opacity:.4;cursor:not-allowed}
.meta-bar{display:flex;justify-content:space-between;font-size:11px;color:#aaa;padding:8px 0;border-top:1px solid #eee;margin-top:32px}
.err{color:#c0392b;font-size:13px;margin-top:12px;padding:8px 12px;background:#fdf0ef;border-radius:6px}
.hidden{display:none}
.end-screen{text-align:center;padding:60px 20px}
.end-title{font-size:22px;font-weight:600;margin-bottom:12px}
.end-msg{font-size:15px;color:#666;line-height:1.6}
.trip-tag{display:inline-block;padding:3px 10px;background:#e8f5ee;color:#2c6e49;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:8px}
.mx-wrap{overflow-x:auto;margin:0 -28px;padding:0 28px}
.mx-table{border-collapse:collapse;width:100%;min-width:500px;font-size:13px}
.mx-table th{padding:10px 6px;text-align:center;font-weight:600;font-size:11px;border-bottom:2px solid #e0e0e0;background:#fafafa;color:#555;line-height:1.3;vertical-align:bottom;min-width:60px}
.mx-table th:first-child{text-align:left;min-width:180px;position:sticky;left:0;z-index:2;background:#fafafa}
.mx-table td{padding:8px 6px;text-align:center;border-bottom:1px solid #eee}
.mx-table td:first-child{text-align:left;font-size:14px;color:#333;position:sticky;left:0;background:#fff;z-index:1;padding-right:12px}
.mx-table tr:hover td{background:#f8faf9}
.mx-radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.mx-radio.checked{border-color:#2c6e49;background:#2c6e49}
.mx-radio:hover{border-color:#999}
.mx-dot{width:6px;height:6px;border-radius:50%;background:#fff;display:none}
.mx-radio.checked .mx-dot{display:block}
</style>
</head>

// ============================================================

// ============================================================
var TRIPS=[{v:"beach",l:"Beach / coastal"},{v:"city",l:"City / urban"},{v:"mountains",l:"Mountains / nature / outdoors"},{v:"countryside",l:"Countryside / rural"},{v:"international",l:"International destination"},{v:"roadtrip",l:"Road trip / driving destination"},{v:"resort",l:"Resort / all-inclusive"},{v:"cruise",l:"Cruise"}];

// ============================================================
// CEP ITEMS
// ============================================================
var CEP=[
{k:"1",p:"Choosing a trip that makes sense for where I am in life right now",e:"The trip felt like the right trip for where I am in life right now"},
{k:"2",p:"Choosing a trip that works for my current living situation",e:"The trip did not disrupt my current living situation"},
{k:"3",p:"Choosing a destination because someone I was traveling with wanted to go",e:"I chose the destination because someone I was traveling with wanted to go"},
{k:"4",p:"Travel companions that are in similar life stages",e:"Travelled with companions who were in similar life stages"},
{k:"5",p:"Sharing the experience with someone I care about",e:"I shared the experience with someone I care about"},
{k:"6",p:"Deepening a relationship with someone I travel with",e:"The trip deepened a relationship with someone I traveled with"},
{k:"7",p:"Testing how the dynamic with my travel companion works during a trip",e:"The trip showed me how well the dynamic with my travel companion works"},
{k:"8",p:"Finding a sense of community while away from home",e:"I found a sense of community while away from home"},
{k:"9",p:"Making a meaningful connection with someone I do not know well before the trip",e:"I made a meaningful connection with someone I did not know well before the trip"},
{k:"10",p:"Traveling as a way to reconnect with myself",e:"The trip helped me reconnect with myself"},
{k:"11",p:"Exploring a new city, lifestyle, or way of living I might want to commit to",e:"Explored a new city, lifestyle, or way of living I could see myself committing to"},
{k:"12",p:"Learning something new about a relationship by traveling together",e:"The trip changed how I see a relationship in my life"},
{k:"13",p:"Making a connection through travel that could last beyond the trip",e:"I made a friendship or connection through travel that lasted beyond the trip"},
{k:"14",p:"Using travel to help make or move toward a major life decision",e:"A trip helped me make or move toward a major life decision"},
{k:"15",p:"Being able to bring or accommodate my pet",e:"I was able to bring or accommodate my pet"},
{k:"16",p:"Knowing my pet will be cared for while I am away",e:"My pet was cared for in a way I felt good about"},
{k:"17",p:"Not having to cancel, shorten, or skip a trip because of my pet",e:"I canceled, shortened, or skipped part of a trip because of my pet"},
{k:"18",p:"Not feeling guilty about leaving my pet when I travel",e:"I felt guilty about leaving my pet behind"},
{k:"19",p:"Choosing a destination or accommodation based on whether it works for my pet",e:"I chose a different destination or accommodation than I wanted because of my pet"},
{k:"20",p:"Having trusted pet care that allows me to adjust or extend my travel plans",e:"I had trusted pet care that made me more flexible to travel"}
];

// ============================================================
// SCREENER
// ============================================================
var SCR=[
{id:"S1",type:"num",sec:"Screener",lab:"S1",text:"What year were you born?",ph:"e.g. 1994"},
{id:"S2",type:"multi",sec:"Screener",lab:"S2",text:"Have you taken at least one leisure trip in the past 12 months? (A leisure trip means a vacation, weekend getaway, or extended personal trip that included at least one overnight stay.)",
opts:[{v:"leisure",l:"I've taken a leisure trip."},{v:"work",l:"I've taken a work trip."},{v:"canceled",l:"I had to cancel a trip."},{v:"none",l:"I didn't plan any trips."}]},
{id:"S3",type:"single",sec:"Screener",lab:"S3",text:"Which of the following best describes your current relationship status?",
opts:[{v:"single",l:"Single, not dating anyone"},{v:"dating",l:"Dating, but not in a committed relationship"},{v:"inRelationship",l:"In a relationship"},{v:"married",l:"Married"},{v:"pnts",l:"Prefer not to say"}]},
{id:"S4",type:"mo",sec:"Screener",lab:"S4",text:"Which best describes your current living situation?",
opts:[{v:"alone",l:"I live alone without roommate"},{v:"partner",l:"I live with a romantic partner or spouse"},{v:"roommates",l:"I live with roommate(s)"},{v:"children",l:"I live with children"},{v:"family",l:"I live with parents or other family members"},{v:"split",l:"I split time across multiple households"}],ol:"Other"},
{id:"S5",type:"single",sec:"Screener",lab:"S5",text:"Do you currently own any pets that live with you?",opts:[{v:"yes",l:"Yes"},{v:"no",l:"No"}]},
{id:"S6",type:"mo",sec:"Screener",lab:"S6",text:"What type of pet or pets do you have?",si:function(){return st.a.S5==="yes";},
opts:[{v:"dog",l:"Dog(s)"},{v:"cat",l:"Cat(s)"},{v:"bird",l:"Bird(s)"},{v:"fish",l:"Fish"},{v:"reptile",l:"Reptile(s)"},{v:"small_mammal",l:"Small mammal(s), such as rabbit, hamster, or guinea pig"}],ol:"Other"},
{id:"AC",type:"single",sec:"Screener",lab:"Attention Check",text:"If today is Monday and yesterday was Sunday, what day is tomorrow?",
opts:[{v:"monday",l:"Monday"},{v:"tuesday",l:"Tuesday"},{v:"wednesday",l:"Wednesday"},{v:"thursday",l:"Thursday"},{v:"friday",l:"Friday"},{v:"saturday",l:"Saturday"},{v:"sunday",l:"Sunday"}]}
];

// ============================================================
// MAIN QUESTIONS (dynamic builder)
// ============================================================
function buildMain(){
var q=[];
// Section 2
q.push({id:"Q1",type:"single",sec:"Travel Behavior",lab:"Q1",text:"Approximately how many leisure trips have you taken in the past 2 years?",
opts:[{v:"1-2",l:"1-2 trips"},{v:"3-4",l:"3-4 trips"},{v:"5-6",l:"5-6 trips"},{v:"7-9",l:"7-9 trips"},{v:"10+",l:"10 or more trips"}]});
q.push({id:"Q2",type:"single",sec:"Travel Behavior",lab:"Q2",text:"How long is your typical leisure trip?",
opts:[{v:"1-2",l:"1-2 nights"},{v:"3-4",l:"3-4 nights"},{v:"5-7",l:"5-7 nights"},{v:"8-14",l:"8-14 nights"},{v:"15+",l:"15+ nights"}]});
q.push({id:"Q3a",type:"mo",sec:"Travel Behavior",lab:"Q3a",text:"What type(s) of leisure trip have you taken in the past 2 years? Please select all that apply.",opts:TRIPS.slice(),ol:"Other"});

if(sel.includes("other")){var ot=st.ot.Q3a?('"'+st.ot.Q3a+'"'):"Other";q.push({id:"Q3b_other",type:"mo",sec:"Travel Behavior",lab:"Q3b",tag:ot+" trip",text:"For your "+ot+" trip(s), who did you travel with?",opts:COMPS.slice(),ol:"Other"});}

opts:[{v:"under500",l:"Under $500"},{v:"500-999",l:"$500-$999"},{v:"1000-1999",l:"$1,000-$1,999"},{v:"2000-2999",l:"$2,000-$2,999"},{v:"3000-4999",l:"$3,000-$4,999"},{v:"5000+",l:"$5,000+"},{v:"unsure",l:"Not sure / prefer not to say"}]});

opts:[{v:"hotel",l:"Hotel"},{v:"rental",l:"Short-term rental, such as Airbnb or Vrbo"},{v:"friends_family",l:"Staying with friends or family"},{v:"hostel",l:"Hostel"},{v:"resort",l:"Resort / all-inclusive"},{v:"camping",l:"Camping / glamping"},{v:"housesitting",l:"House sitting, meaning staying in someone else's home in exchange for pet or home care"},{v:"exchange",l:"Home exchange"}],ol:"Other"});

// Section 3 - Most Recent Trip
q.push({id:"S3_INTRO",type:"intro",sec:"Most Recent Trip",lab:"Introduction",text:"Now we're going to pivot and ask you questions about your most recent leisure trip."});
q.push({id:"Q6",type:"mo",sec:"Most Recent Trip",lab:"Q6",text:"Thinking about your most recent leisure trip, who did you travel with?",
opts:[{v:"solo",l:"I traveled solo"},{v:"partner",l:"A romantic partner or spouse"},{v:"friends",l:"Friend(s)"},{v:"family",l:"Family member(s)"},{v:"children",l:"My child / children"},{v:"pets",l:"My pet(s)"},{v:"group_tour",l:"A group tour or organized travel group"},{v:"strangers",l:"People I did not know well before the trip"}],ol:"Other"});
q.push({id:"Q7",type:"text",sec:"Most Recent Trip",lab:"Q7",text:"Where did you go on your most recent leisure trip?",ph:"e.g. Cancun, Mexico"});
q.push({id:"Q8",type:"single",sec:"Most Recent Trip",lab:"Q8",text:"How long was your most recent leisure trip?",

q.push({id:"Q9",type:"single",sec:"Most Recent Trip",lab:"Q9",text:"Approximately how much did you personally spend on your most recent leisure trip, including accommodation, transportation, food, and activities?",
opts:[{v:"under500",l:"Under $500"},{v:"500-999",l:"$500-$999"},{v:"1000-1999",l:"$1,000-$1,999"},{v:"2000-2999",l:"$2,000-$2,999"},{v:"3000-4999",l:"$3,000-$4,999"},{v:"5000+",l:"$5,000+"},{v:"unsure",l:"Not sure / prefer not to say"}]});
q.push({id:"Q10",type:"so",sec:"Most Recent Trip",lab:"Q10",text:"What type of accommodation did you primarily use on your most recent leisure trip?",

q.push({id:"Q12b",type:"mo",sec:"Most Recent Trip",lab:"Q12b",text:"What was it about? Select all that apply.",si:function(){return st.a.Q12a&&st.a.Q12a!=="no";},

function render(){
document.getElementById("mr").textContent="ID: "+RID;
document.getElementById("md").textContent=DV;

function rq(list,idx){
var q=list[idx];if(!q)return;
var card=document.getElementById("qc");
var h='<div class="sec-label">'+esc(q.sec)+'</div>';
if(q.tag)h+='<div class="trip-tag">'+esc(q.tag)+'</div>';
if(q.type!=="intro")h+='<div class="q-text">'+esc(q.text)+'</div>';
if(q.sub)h+='<div class="q-sub">'+esc(q.sub)+'</div>';
if(q.type==="intro")h+='<div class="intro-text">'+esc(q.text)+'</div>';
else if(q.type==="num")h+=rNum(q);
else if(q.type==="text")h+=rText(q);
else if(q.type==="textarea")h+=rTA(q);
else if(q.type==="single")h+=rSingle(q.id,q.opts);
else if(q.type==="so")h+=rSingleOther(q.id,q.opts,q.ol);
else if(q.type==="multi"||q.type==="mo")h+=rMulti(q.id,q.opts,q.type==="mo"?q.ol:null,q.excl,q.max);
else if(q.type==="matrix")h+=rMatrix(q);
h+='<div id="em" class="err hidden"></div>';
card.innerHTML=h;
bind(q);
upProg(list,idx,q);upNav();
}

function rNum(q){return'<input type="text" inputmode="numeric" class="text-input" id="inp" placeholder="'+esc(q.ph)+'" value="'+esc(st.a[q.id]||"")+'">';}
function rText(q){return'<input type="text" class="text-input" id="inp" placeholder="'+esc(q.ph||"")+'" value="'+esc(st.a[q.id]||"")+'">';}
function rTA(q){return'<textarea class="textarea" id="inp" placeholder="'+esc(q.ph||"")+'">'+(st.a[q.id]||"")+'</textarea>';}

function rSingle(qid,opts){
var val=st.a[qid]||"",h='<div class="opt-group">';
opts.forEach(function(o){var s=val===o.v?" selected":"";h+='<div class="opt'+s+'" data-v="'+o.v+'" data-q="'+qid+'" data-t="s"><div class="rc"><div class="rd"></div></div><span>'+esc(o.l)+'</span></div>';});
return h+'</div>';
}

function rSingleOther(qid,opts,ol){
var val=st.a[qid]||"",h='<div class="opt-group">';
opts.forEach(function(o){var s=val===o.v?" selected":"";h+='<div class="opt'+s+'" data-v="'+o.v+'" data-q="'+qid+'" data-t="s"><div class="rc"><div class="rd"></div></div><span>'+esc(o.l)+'</span></div>';});
if(ol){var os=val==="other"?" selected":"";
h+='<div class="other-row'+os+'" data-q="'+qid+'"><div class="cb" data-v="other" data-q="'+qid+'" data-t="so-chk"><span class="cm">✓</span></div><span style="white-space:nowrap">'+esc(ol)+':</span><input class="other-input" id="oi-'+qid+'" placeholder="Please specify" value="'+esc(st.ot[qid]||"")+'"></div>';}
return h+'</div>';
}

function rMulti(qid,opts,ol,excl,max){
var vals=st.a[qid]||[],h='<div class="opt-group">';
if(max)h+='<div class="q-sub" style="margin-top:-12px;margin-bottom:12px">Select up to '+max+'.</div>';
opts.forEach(function(o){var s=vals.includes(o.v)?" selected":"";h+='<div class="opt'+s+'" data-v="'+o.v+'" data-q="'+qid+'" data-t="m" data-excl="'+(excl||"")+'" data-max="'+(max||"")+'"><div class="cb"><span class="cm">✓</span></div><span>'+esc(o.l)+'</span></div>';});
if(ol){var os=vals.includes("other")?" selected":"";
h+='<div class="other-row'+os+'" data-q="'+qid+'"><div class="cb" data-v="other" data-q="'+qid+'" data-t="mo-chk" data-excl="'+(excl||"")+'" data-max="'+(max||"")+'"><span class="cm">✓</span></div><span style="white-space:nowrap">'+esc(ol)+':</span><input class="other-input" id="oi-'+qid+'" placeholder="Please specify" value="'+esc(st.ot[qid]||"")+'"></div>';}
return h+'</div>';
}

function rMatrix(q){
var data=st.a[q.id]||{};
var h='<div class="mx-wrap"><table class="mx-table"><thead><tr><th></th>';
q.cols.forEach(function(c){h+='<th>'+esc(c.l)+'</th>';});
h+='</tr></thead><tbody>';
q.rows.forEach(function(r){
h+='<tr><td>'+esc(r.l)+'</td>';
q.cols.forEach(function(c){
var checked=data[r.v]===c.v;
h+='<td><div class="mx-radio'+(checked?" checked":"")+'" data-q="'+q.id+'" data-r="'+r.v+'" data-c="'+c.v+'"><div class="mx-dot"></div></div></td>';
});
h+='</tr>';});
return h+'</tbody></table></div>';
}

// ============================================================
// BINDING
// ============================================================
function bind(q){
if(q.type==="num"){var inp=document.getElementById("inp");if(inp){inp.focus();inp.addEventListener("input",function(){st.a[q.id]=inp.value.replace(/[^0-9]/g,"").slice(0,4);inp.value=st.a[q.id];});inp.addEventListener("keydown",function(e){if(e.key==="Enter")handleNext();});}}
if(q.type==="text"){var inp2=document.getElementById("inp");if(inp2){inp2.focus();inp2.addEventListener("input",function(){st.a[q.id]=inp2.value;});inp2.addEventListener("keydown",function(e){if(e.key==="Enter")handleNext();});}}
if(q.type==="textarea"){var ta=document.getElementById("inp");if(ta){ta.addEventListener("input",function(){st.a[q.id]=ta.value;});}}
// Single
document.querySelectorAll('[data-t="s"]').forEach(function(el){el.addEventListener("click",function(){st.a[el.dataset.q]=el.dataset.v;render();});});
// Single with other
document.querySelectorAll('[data-t="so-chk"]').forEach(function(el){el.addEventListener("click",function(e){e.stopPropagation();st.a[el.dataset.q]="other";render();});});
// Multi
document.querySelectorAll('[data-t="m"]').forEach(function(el){el.addEventListener("click",function(){
var qid=el.dataset.q,v=el.dataset.v,excl=el.dataset.excl,max=parseInt(el.dataset.max)||0;
if(!st.a[qid])st.a[qid]=[];var a=st.a[qid];
if(excl&&v===excl){st.a[qid]=a.includes(v)?[]:[v];render();return;}
a=a.filter(function(x){return x!==excl;});
var i=a.indexOf(v);if(i>=0)a.splice(i,1);else{if(max&&a.length>=max)return;a.push(v);}
st.a[qid]=a;render();});});
// Multi other checkbox
document.querySelectorAll('[data-t="mo-chk"]').forEach(function(el){el.addEventListener("click",function(e){
e.stopPropagation();var qid=el.dataset.q,excl=el.dataset.excl,max=parseInt(el.dataset.max)||0;
if(!st.a[qid])st.a[qid]=[];var a=st.a[qid];
a=a.filter(function(x){return x!==excl;});
var i=a.indexOf("other");if(i>=0)a.splice(i,1);else{if(max&&a.length>=max)return;a.push("other");}
st.a[qid]=a;render();});});
// Other input
var oi=document.getElementById("oi-"+q.id);
if(oi){oi.addEventListener("input",function(){st.ot[q.id]=oi.value;
if(q.type==="so"){if(oi.value)st.a[q.id]="other";}
else{if(oi.value){if(!st.a[q.id])st.a[q.id]=[];if(!st.a[q.id].includes("other")){st.a[q.id].push("other");render();}}}
});oi.addEventListener("click",function(e){e.stopPropagation();});}
// Matrix
document.querySelectorAll('.mx-radio').forEach(function(el){el.addEventListener("click",function(){
var qid=el.dataset.q,r=el.dataset.r,c=el.dataset.c;
if(!st.a[qid])st.a[qid]={};st.a[qid][r]=c;render();});});
}

function sErr(m){var e=document.getElementById("em");if(e){e.textContent=m;e.classList.remove("hidden");}}
function cErr(){var e=document.getElementById("em");if(e){e.textContent="";e.classList.add("hidden");}}

function valScr(){
var s=vs(),q=s[st.sp];if(!q)return false;var v=st.a[q.id];
switch(q.id){
case"S1":{var y=parseInt(v,10);if(!v||isNaN(y)||y<1900||y>C.yr){sErr("Please enter a valid birth year.");return false;}var age=C.yr-y;if(age<C.minAge||age>C.maxAge){endS("terminated","Age "+age+" outside range");return"t";}return true;}
case"S2":{if(!v||!Array.isArray(v)||v.length===0){sErr("Please select at least one option.");return false;}if(!v.includes("leisure")){endS("terminated","No leisure trip");return"t";}return true;}
case"S3":{if(!v){sErr("Please select an option.");return false;}if(v==="pnts"){endS("terminated","Relationship: prefer not to say");return"t";}if(st.qc&&st.qc.relationship&&st.qc.relationship[v]){var qc=st.qc.relationship[v];if(qc.current>=qc.target){endS("quotaFull","Relationship quota full");return"t";}}return true;}
case"S4":{if(!v||(Array.isArray(v)&&v.length===0)){sErr("Please select at least one option.");return false;}return true;}
case"S5":{if(!v){sErr("Please select an option.");return false;}if(st.qc&&st.qc.pets&&st.qc.pets[v]){var q2=st.qc.pets[v];if(q2.current>=q2.target){endS("quotaFull","Pet quota full");return"t";}}return true;}
case"S6":{if(!v||(Array.isArray(v)&&v.length===0)){sErr("Please select at least one option.");return false;}return true;}
case"AC":{if(!v){sErr("Please select an option.");return false;}if(v!=="tuesday"){endS("terminated","Failed attention check");return"t";}return true;}
default:return true;
}}

function valMain(){
var m=vm(),q=m[st.mp];if(!q)return false;var v=st.a[q.id];
if(q.type==="intro")return true;
if(q.type==="textarea"){if(q.req&&(!v||v.trim()==="")){sErr("Please provide a response.");return false;}return true;}
if(q.type==="single"||q.type==="so"){if(!v){sErr("Please select an option.");return false;}return true;}
if(q.type==="multi"||q.type==="mo"){if(!v||!Array.isArray(v)||v.length===0){sErr("Please select at least one option.");return false;}return true;}
if(q.type==="num"){if(!v){sErr("Please enter a value.");return false;}return true;}
if(q.type==="text"){if(!v||v.trim()===""){sErr("Please provide a response.");return false;}return true;}
if(q.type==="matrix"){if(!v||typeof v!=="object"){sErr("Please answer each row.");return false;}var missing=q.rows.filter(function(r){return!v[r.v];});if(missing.length>0){sErr("Please answer all rows. "+missing.length+" remaining.");return false;}return true;}
return true;
}
